<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation VIP - Fabrice & Martine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #0a0a0a; color: #ffffff; margin: 0; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .gold { color: #d4af37; }
        .bg-section { background-size: cover; background-position: center; position: relative; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .overlay { background: rgba(0, 0, 0, 0.6); position: absolute; inset: 0; z-index: 1; }
        .content { position: relative; z-index: 10; width: 100%; padding: 20px; }
        .bg-card { background: rgba(15, 15, 15, 0.9); border: 1px solid #333; border-radius: 25px; backdrop-filter: blur(8px); }
        
        /* Boutons de boissons */
        .drink-btn { border: 1px solid #444; padding: 10px; border-radius: 12px; font-size: 11px; transition: all 0.3s; text-transform: uppercase; background: rgba(255,255,255,0.05); }
        .drink-btn.selected { background: #d4af37; color: #000; border-color: #d4af37; font-weight: bold; transform: scale(1.05); }
        
        .btn-gold { background: linear-gradient(135deg, #d4af37 0%, #f2d388 100%); color: #000; font-weight: bold; }
        .heart { position: fixed; top: -10%; font-size: 20px; color: #ff3e3e; pointer-events: none; z-index: 100; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <!-- SECTION 1 : ACCUEIL -->
    <section class="bg-section" style="background-image: url('https://i.postimg.cc/kDHh8RSz/A7400159.jpg');">
        <div class="overlay"></div>
        <div class="content text-center">
            <h1 class="serif text-4xl mb-2">FABRICE <br>& <span class="gold">MARTINE</span></h1>
            <p class="text-gray-200 italic text-sm" id="welcome-name">Chargement...</p>
            <p class="mt-24 animate-bounce text-[10px] text-gray-400 uppercase tracking-widest text-center w-full">Glissez vers le bas ↓</p>
        </div>
    </section>

    <!-- SECTION 2 : PROGRAMME -->
    <section class="bg-section" style="background-image: url('https://i.postimg.cc/p9vSrNjL/IMG-20260713-WA0011.jpg');">
        <div class="overlay" style="background: rgba(0,0,0,0.75);"></div>
        <div class="content w-full max-w-md px-4 text-center">
            <div class="bg-card p-8">
                <h2 class="serif text-2xl gold mb-8 uppercase">Programme</h2>
                <div class="space-y-6 text-sm text-gray-300">
                    <p><span class="gold font-bold uppercase">10h00 : Bénédiction</span><br>Église ALEC, Matete</p>
                    <p><span class="gold font-bold uppercase">19h00 : Soirée de Gala</span><br>Salle GG MART, Lemba</p>
                </div>
            </div>
        </div>
    </section>

    <!-- SECTION 3 : CHOIX DES BOISSONS -->
    <section class="bg-black py-16 text-center content">
        <h2 class="serif text-2xl gold mb-4 uppercase">Confirmation</h2>
        <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-8">Sélectionnez votre boisson préférée</p>
        
        <div class="max-w-sm mx-auto bg-card p-6 space-y-8">
            <!-- Grille des boissons -->
            <div class="grid grid-cols-2 gap-3" id="drinks-grid">
                <button onclick="selectDrink('Coca-Cola', this)" class="drink-btn">Coca-Cola</button>
                <button onclick="selectDrink('Fanta Orange', this)" class="drink-btn">Fanta Orange</button>
                <button onclick="selectDrink('Sprite', this)" class="drink-btn">Sprite</button>
                <button onclick="selectDrink('Eau Minérale', this)" class="drink-btn">Eau Minérale</button>
                <button onclick="selectDrink('Heineken', this)" class="drink-btn">Heineken</button>
                <button onclick="selectDrink('Mutzig', this)" class="drink-btn">Mutzig</button>
                <button onclick="selectDrink('Primus', this)" class="drink-btn">Primus</button>
                <button onclick="selectDrink('Vin Rouge', this)" class="drink-btn">Vin Rouge</button>
                <button onclick="selectDrink('Vin Blanc', this)" class="drink-btn">Vin Blanc</button>
                <button onclick="selectDrink('Champagne', this)" class="drink-btn">Champagne</button>
            </div>

            <button onclick="submitRSVP()" class="w-full btn-gold py-5 rounded-full uppercase text-[11px] tracking-widest shadow-lg">Confirmer ma présence</button>
        </div>
    </section>

    <!-- SECTION 4 : PASS ACCÈS VIP -->
    <section class="bg-section" style="background-image: url('https://i.postimg.cc/ftr5x1Vd/A7400151.jpg');">
        <div class="overlay" style="background: rgba(255,255,255,0.92);"></div>
        <div class="content text-black text-center p-10">
            <h2 class="serif text-2xl mb-8 italic">Carte d'accès VIP</h2>
            <div class="p-4 border border-gray-200 inline-block rounded-3xl bg-white mb-6">
                <img id="qr-image" src="" alt="QR Access" class="w-40 h-40">
            </div>
            <p id="guest-label" class="font-bold text-lg uppercase mb-2"></p>
            <div class="bg-black text-white px-10 py-3 rounded-full inline-block font-bold gold" id="table-label"></div>
        </div>
    </section>

    <script>
        const MON_NUMERO = "243812836540"; 
        let selectedDrink = "";

        const params = new URLSearchParams(window.location.search);
        const nomInvite = params.get('n') || "Cher Invité";
        const numTable = params.get('t') || "À l'accueil";

        document.getElementById('welcome-name').innerText = "Bienvenue, " + nomInvite.replace(/_/g, ' ');
        document.getElementById('guest-label').innerText = nomInvite.replace(/_/g, ' ');
        document.getElementById('table-label').innerText = "TABLE " + numTable;
        
        const qrContent = `VIP-MARIAGE-NOM:${nomInvite}-TABLE:${numTable}`;
        document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${qrContent}`;

        // Fonction pour choisir une boisson
        function selectDrink(name, element) {
            // Retirer la classe 'selected' de tous les boutons
            document.querySelectorAll('.drink-btn').forEach(btn => btn.classList.remove('selected'));
            // Ajouter à celui cliqué
            element.classList.add('selected');
            selectedDrink = name;
        }

        // Animation des cœurs
        setInterval(() => {
            const h = document.createElement('div');
            h.classList.add('heart'); h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + "vw";
            h.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 600);

        function submitRSVP() {
            if(selectedDrink === "") {
                alert("Veuillez sélectionner une boisson avant de confirmer.");
                return;
            }
            const message = `*CONFIRMATION MARIAGE*%0A--------------------------%0A👤 *Invité:* ${nomInvite.replace(/_/g, ' ')}%0A✅ *Présence:* Confirmée%0A🍷 *Boisson choisie:* ${selectedDrink}%0A📍 *Table:* ${numTable}`;
            window.location.href = `https://wa.me/${MON_NUMERO}?text=${message}`;
        }
    </script>
</body>
</html>
