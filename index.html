<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Invitation - Fabrice & Martine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --gold-light: #e2c28a; --dark: #0a0a0a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark); color: #ffffff; margin: 0; }
        .serif { font-family: 'Playfair Display', serif; }
        .text-gold { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gold { background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 50%, #aa771c 100%); color: #000; }
        .border-gold { border: 1px solid #bf953f; }
        .section-bg { background-size: cover; background-position: center; background-attachment: fixed; position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .overlay-dark { background: rgba(0, 0, 0, 0.65); position: absolute; inset: 0; }
        .premium-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(191, 149, 63, 0.3); border-radius: 2px; padding: 40px 20px; }
        .drink-chip { border: 1px solid rgba(255,255,255,0.2); padding: 12px; font-size: 10px; letter-spacing: 1px; transition: all 0.4s ease; text-transform: uppercase; background: transparent; }
        .drink-chip.selected { background: #bf953f; color: white; border-color: #bf953f; }
        .heart { position: fixed; top: -10%; font-size: 18px; color: #d63031; pointer-events: none; z-index: 100; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <!-- HERO SECTION -->
    <section class="section-bg" style="background-image: url('https://i.postimg.cc/kDHh8RSz/A7400159.jpg');">
        <div class="overlay-dark"></div>
        <div class="relative z-10 text-center px-4">
            <p class="uppercase tracking-[0.5em] text-[10px] mb-6 opacity-70">Invitation Officielle</p>
            <h1 class="serif text-5xl mb-4 text-gold italic font-light">Fabrice & Martine</h1>
            <div class="w-12 h-[1px] bg-gold mx-auto my-8"></div>
            <p class="text-sm tracking-[0.2em] font-light uppercase" id="welcome-name">Chargement...</p>
        </div>
    </section>

    <!-- PROGRAMME -->
    <section class="section-bg" style="background-image: url('https://i.postimg.cc/p9vSrNjL/IMG-20260713-WA0011.jpg');">
        <div class="overlay-dark" style="background: rgba(0,0,0,0.8);"></div>
        <div class="relative z-10 w-full max-w-lg px-6">
            <div class="premium-card text-center">
                <h2 class="serif text-3xl text-gold mb-12 italic">Le Programme</h2>
                <div class="space-y-8">
                    <div>
                        <p class="text-xs gold mb-1 uppercase tracking-widest italic">10h00 : Bénédiction</p>
                        <p class="serif text-xl text-white">Paroisse ALEC, Matete</p>
                        <a href="https://maps.google.com/?q=5eme+rue+88+Matete+Kinshasa" class="text-[9px] uppercase tracking-widest text-gold underline">Itinéraire Maps</a>
                    </div>
                    <div class="w-8 h-[1px] bg-gold/30 mx-auto"></div>
                    <div>
                        <p class="text-xs gold mb-1 uppercase tracking-widest italic">19h00 : Soirée de Gala</p>
                        <p class="serif text-xl text-white">Salle GG MART, Lemba</p>
                        <a href="https://maps.google.com/?q=Salle+GG+Mart+Lemba+Kinshasa" class="text-[9px] uppercase tracking-widest text-gold underline">Itinéraire Maps</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- RSVP -->
    <section class="bg-[#050505] py-24 px-6">
        <div class="max-w-md mx-auto text-center">
            <h2 class="serif text-4xl text-gold mb-12 italic">Confirmation</h2>
            <div class="grid grid-cols-2 gap-4 mb-12">
                <button onclick="selectDrink('Champagne', this)" class="drink-chip">Champagne</button>
                <button onclick="selectDrink('Vin de Prestige', this)" class="drink-chip">Vin de Prestige</button>
                <button onclick="selectDrink('Heineken', this)" class="drink-chip">Heineken</button>
                <button onclick="selectDrink('Liqueur', this)" class="drink-chip">Liqueur</button>
                <button onclick="selectDrink('Jus Naturel', this)" class="drink-chip">Jus Naturel</button>
                <button onclick="selectDrink('Coca-Cola', this)" class="drink-chip">Coca-Cola</button>
            </div>
            <button onclick="submitRSVP()" class="bg-gold w-full py-5 rounded-sm text-[11px] uppercase tracking-[0.4em] font-bold shadow-2xl">Confirmer ma présence</button>
        </div>
    </section>

    <!-- PASS VIP (VILLAGE & TABLE) -->
    <section class="section-bg" style="background-image: url('https://i.postimg.cc/ftr5x1Vd/A7400151.jpg');">
        <div class="absolute inset-0 bg-white/95 backdrop-blur-sm"></div>
        <div class="relative z-10 text-black text-center p-8 w-full">
            <p class="uppercase tracking-[0.5em] text-[10px] mb-4 text-gray-400">Carte d'Accès VIP</p>
            <h2 class="serif text-4xl mb-10 italic">Identification</h2>
            
            <div class="p-6 border border-gray-100 bg-white inline-block shadow-2xl mb-8">
                <img id="qr-image" src="" alt="QR Access" class="w-48 h-48">
            </div>
            
            <div class="space-y-4">
                <p id="guest-label" class="serif text-2xl uppercase tracking-widest border-b border-black/10 pb-2 inline-block px-4 font-light"></p>
                
                <div class="flex justify-center gap-4 mt-6">
                    <div class="bg-gray-100 px-6 py-3 rounded-sm border-l-4 border-gold">
                        <p class="text-[8px] uppercase tracking-widest text-gray-500 mb-1">Village</p>
                        <p id="village-label" class="font-bold text-sm gold uppercase"></p>
                    </div>
                    <div class="bg-black text-white px-6 py-3 rounded-sm">
                        <p class="text-[8px] uppercase tracking-widest opacity-50 mb-1">Table</p>
                        <p id="table-label" class="font-bold text-sm gold uppercase"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const MON_NUMERO = "243812836540";
        let selectedDrink = "";

        const params = new URLSearchParams(window.location.search);
        const nomInvite = params.get('n') || "Cher Invité";
        const nomVillage = params.get('v') || "À Déterminer"; // Paramètre 'v'
        const numTable = params.get('t') || "À l'accueil";

        document.getElementById('welcome-name').innerText = "Bienvenue, " + nomInvite.replace(/_/g, ' ');
        document.getElementById('guest-label').innerText = nomInvite.replace(/_/g, ' ');
        document.getElementById('village-label').innerText = nomVillage.replace(/_/g, ' ');
        document.getElementById('table-label').innerText = numTable.replace(/_/g, ' ');
        
        const qrContent = `VIP-FM:NOM:${nomInvite}-VILLAGE:${nomVillage}-TABLE:${numTable}`;
        document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${qrContent}`;

        function selectDrink(name, el) {
            document.querySelectorAll('.drink-chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedDrink = name;
        }

        function submitRSVP() {
            if(!selectedDrink) return alert("Veuillez sélectionner une boisson.");
            const msg = `*CONFIRMATION VIP*%0A--------------------------%0A👤 *Invité:* ${nomInvite.replace(/_/g, ' ')}%0A🌍 *Village:* ${nomVillage.replace(/_/g, ' ')}%0A📍 *Table:* ${numTable.replace(/_/g, ' ')}%0A🍷 *Boisson:* ${selectedDrink}`;
            window.location.href = `https://wa.me/${MON_NUMERO}?text=${msg}`;
        }

        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart'; h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + "vw";
            h.style.animationDuration = (Math.random() * 3 + 3) + "s";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }, 800);
    </script>
</body>
                    </html>
